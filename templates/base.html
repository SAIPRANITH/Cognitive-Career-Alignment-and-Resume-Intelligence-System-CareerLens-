<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Career Lens{% endblock %}</title>
    <meta name="description" content="AI-powered resume analysis, job prediction, and career guidance platform using Machine Learning.">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block head %}{% endblock %}
</head>
<body>
    <!-- Professional Data Particles Background -->
    <div id="particles-js"></div>
    <div class="cyber-grid"></div>

    <!-- Top Navigation Bar -->
    <nav class="navbar navbar-expand-lg glass-nav fixed-top px-4 py-3 z-3">
        <div class="container-fluid">
            <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="Career Lens Logo" width="40" height="40" class="rounded-circle shadow-sm">
                <span class="fs-5 fw-bold brand-text ms-2">Career Lens</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#topNav">
                <i class="bi bi-list text-primary fs-2"></i>
            </button>
            <div class="collapse navbar-collapse justify-content-end" id="topNav">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-center">
                    <li class="nav-item me-4 d-none d-md-block">
                        <div class="d-flex align-items-center bg-dark bg-opacity-50 px-3 py-1 rounded-pill border border-secondary border-opacity-25">
                            <span class="pulse-indicator bg-success rounded-circle me-2" style="width: 8px; height: 8px; display: inline-block;"></span>
                            <span class="text-success small fw-bold text-uppercase letter-spacing-1" style="font-size: 0.7rem;">Engine Online</span>
                        </div>
                    </li>
                </ul>
                <ul class="navbar-nav gap-4 align-items-center">
                    <li class="nav-item"><a class="nav-link fw-bold" href="{{ url_for('dashboard') }}"><i class="bi bi-grid-1x2 me-1"></i> Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="{{ url_for('ai_feedback') }}"><i class="bi bi-chat-right-text me-1"></i> AI Feedback</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="{{ url_for('cover_letter') }}"><i class="bi bi-envelope-paper me-1"></i> Cover Letter</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold" href="{{ url_for('role_checker_tool') }}"><i class="bi bi-bullseye me-1"></i> Role Checker</a></li>
                    <li class="nav-item"><a class="nav-link fw-bold text-gradient" href="{{ url_for('engine_details') }}"><i class="bi bi-cpu me-1"></i> Engine Core</a></li>
                </ul>
            </div>
        </div>
    </nav>

    
    {% block body %}{% endblock %}

    <!-- Professional Footer -->
    <footer class="mt-auto border-top border-secondary border-opacity-10 py-4" style="background: rgba(6, 11, 20, 0.8); backdrop-filter: blur(10px);">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-4 text-center text-md-start mb-3 mb-md-0">
                    <span class="fw-bold text-gradient">Career Lens</span>
                    <span class="text-muted small ms-2">&copy; 2026</span>
                </div>
                <div class="col-md-4 text-center mb-3 mb-md-0">
                    <div class="d-flex justify-content-center gap-3">
                        <a href="{{ url_for('dashboard') }}" class="text-muted small text-decoration-none badge-hover">Dashboard</a>
                        <a href="{{ url_for('engine_details') }}" class="text-muted small text-decoration-none badge-hover">Engine</a>
                        <a href="{{ url_for('ai_feedback') }}" class="text-muted small text-decoration-none badge-hover">AI</a>
                    </div>
                </div>
                <div class="col-md-4 text-center text-md-end">
                    <div class="d-flex justify-content-center justify-content-md-end gap-2">
                        <span class="badge bg-secondary bg-opacity-10 text-muted border border-secondary border-opacity-25 rounded-pill px-2 py-1" style="font-size: 0.65rem;">Flask</span>
                        <span class="badge bg-secondary bg-opacity-10 text-muted border border-secondary border-opacity-25 rounded-pill px-2 py-1" style="font-size: 0.65rem;">Scikit-learn</span>
                        <span class="badge bg-secondary bg-opacity-10 text-muted border border-secondary border-opacity-25 rounded-pill px-2 py-1" style="font-size: 0.65rem;">Gemini AI</span>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <!-- Particles.js -->
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    
    <script>
        // Professional Particles Configuration
        document.addEventListener("DOMContentLoaded", () => {
            particlesJS('particles-js', {
                "particles": {
                    "number": { "value": 60, "density": { "enable": true, "value_area": 800 } },
                    "color": { "value": "#00e5ff" },
                    "shape": { "type": "circle" },
                    "opacity": { "value": 0.3, "random": false },
                    "size": { "value": 2, "random": true },
                    "line_linked": { "enable": true, "distance": 150, "color": "#00e5ff", "opacity": 0.15, "width": 1 },
                    "move": { "enable": true, "speed": 1, "direction": "none", "random": false, "straight": false, "out_mode": "out", "bounce": false }
                },
                "interactivity": {
                    "detect_on": "canvas",
                    "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" }, "resize": true },
                    "modes": { "grab": { "distance": 140, "line_linked": { "opacity": 0.4 } }, "push": { "particles_nb": 4 } }
                },
                "retina_detect": true
            });
        });
    </script>
    
    <script>
        // Page load fade-in
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.querySelector('.container');
            if(container && !container.classList.contains('fade-in-up')) {
                container.classList.add('fade-in-up');
            }
        });
    </script>
    
    {% block scripts %}{% endblock %}
</body>
</html>
